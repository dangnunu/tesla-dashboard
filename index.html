/* 상단 바 */
.top-bar { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.clock-time { font-size:28px; font-weight:500; color:#fff; letter-spacing:1px; text-align:center; }
.clock-date { font-size:11px; color:rgba(255,255,255,0.65); text-align:center; margin-top:2px; }
.weather-block { display:flex; align-items:center; gap:10px; }
.weather-icon { font-size:26px; }
.weather-temp { font-size:22px; font-weight:500; color:#fff; }
.weather-desc { font-size:11px; color:rgba(255,255,255,0.6); margin-top:2px; }
.music-label { font-size:10px; color:rgba(255,255,255,0.45); margin-bottom:3px; }
.music-title { font-size:13px; font-weight:500; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.music-artist { font-size:11px; color:rgba(255,255,255,0.55); }
.music-controls { display:flex; align-items:center; gap:7px; margin-top:7px; }
.ctrl-btn { background:rgba(255,255,255,0.14); border:none; border-radius:50%; width:27px; height:27px; color:#fff; cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
.ctrl-btn:hover { background:rgba(255,255,255,0.28); }
.ctrl-btn.play { background:rgba(200,230,180,0.55); width:32px; height:32px; font-size:13px; }
.ctrl-btn.play:hover { background:rgba(160,210,120,0.85); }
.progress-bar { flex:1; height:3px; background:rgba(255,255,255,0.18); border-radius:2px; overflow:hidden; }
.progress-fill { width:35%; height:100%; background:rgba(200,230,160,0.85); border-radius:2px; }

/* 메인 */
.main-area { display:grid; grid-template-columns:2fr 1fr; gap:10px; min-height:0; }
.map-section { display:flex; flex-direction:column; gap:7px; min-height:0; }

/* 검색 + 탭 */
.search-row { display:flex; gap:6px; }
.search-input { flex:1; background:rgba(255,255,255,0.13); border:0.5px solid rgba(255,255,255,0.25); border-radius:10px; padding:8px 13px; color:#fff; font-size:13px; outline:none; }
.search-input::placeholder { color:rgba(255,255,255,0.4); }
.search-input:focus { border-color:rgba(200,230,160,0.7); background:rgba(255,255,255,0.2); }
.search-btn { background:rgba(200,230,160,0.5); border:none; border-radius:10px; color:#fff; padding:8px 14px; font-size:12px; cursor:pointer; white-space:nowrap; }
.search-btn:hover { background:rgba(160,210,100,0.75); }

.map-tabs { display:flex; gap:6px; }
.tab-btn { padding:5px 14px; border-radius:18px; border:0.5px solid rgba(255,255,255,0.22); background:rgba(255,255,255,0.09); color:rgba(255,255,255,0.55); font-size:12px; cursor:pointer; transition:all 0.15s; }
.tab-btn.active { background:rgba(200,230,160,0.5); border-color:rgba(200,230,160,0.7); color:#fff; }

.map-frame { flex:1; border-radius:14px; overflow:hidden; border:0.5px solid rgba(255,255,255,0.15); background:rgba(0,0,0,0.2); position:relative; min-height:0; }
#map-render, #map-render > div { width:100%; height:100%; }

.map-placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
.map-placeholder-icon { font-size:32px; }
.map-placeholder-text { font-size:13px; color:rgba(255,255,255,0.6); }
.map-placeholder-sub { font-size:11px; color:rgba(255,255,255,0.35); text-align:center; line-height:1.7; padding:0 20px; }

/* 사이드바 */
.sidebar { display:flex; flex-direction:column; gap:8px; min-height:0; }
.fav-section { flex:1; overflow-y:auto; }
.section-label { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:7px; letter-spacing:0.5px; text-transform:uppercase; }
.fav-list { display:flex; flex-direction:column; gap:5px; }
.fav-item { background:rgba(255,255,255,0.09); border:0.5px solid rgba(255,255,255,0.12); border-radius:10px; padding:9px 11px; display:flex; align-items:center; gap:9px; cursor:pointer; transition:background 0.15s; }
.fav-item:hover { background:rgba(255,255,255,0.18); }
.fav-icon { font-size:17px; flex-shrink:0; }
.fav-name { font-size:13px; font-weight:500; color:#fff; }
.fav-addr { font-size:10px; color:rgba(255,255,255,0.4); margin-top:1px; }
.navi-btn { background:rgba(200,230,160,0.5); border:none; border-radius:7px; color:#fff; font-size:10px; padding:4px 8px; cursor:pointer; margin-left:auto; flex-shrink:0; }
.navi-btn:hover { background:rgba(160,210,100,0.8); }

.api-banner { display:none; background:rgba(255,220,80,0.18); border:0.5px solid rgba(255,220,80,0.4); border-radius:10px; padding:9px 13px; font-size:11px; color:rgba(255,245,200,0.85); line-height:1.7; }
</style>

</head>
<body>
<div class="dashboard">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">

    <!-- 상단 바 -->
    <div class="top-bar">
      <div class="card">
        <div class="clock-time" id="clock">00:00</div>
        <div class="clock-date" id="date-str">---</div>
      </div>
      <div class="card weather-block">
        <div class="weather-icon" id="weather-icon">🌤️</div>
        <div>
          <div class="weather-temp" id="weather-temp">--°C</div>
          <div class="weather-desc" id="weather-desc">날씨 불러오는 중...</div>
        </div>
      </div>
      <div class="card">
        <div class="music-label">재생 중</div>
        <div class="music-title" id="music-title">Blinding Lights</div>
        <div class="music-artist" id="music-artist">The Weeknd</div>
        <div class="music-controls">
          <button class="ctrl-btn" onclick="prevTrack()">&#9664;&#9664;</button>
          <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">&#9654;</button>
          <button class="ctrl-btn" onclick="nextTrack()">&#9654;&#9654;</button>
          <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
        </div>
      </div>
    </div>

    <!-- 메인 -->
    <div class="main-area">
      <div class="map-section">
        <div class="search-row">
          <input class="search-input" id="searchInput" type="text" placeholder="목적지 검색..." />
          <button class="search-btn" onclick="searchPlace()">검색</button>
        </div>
        <div class="map-tabs">
          <button class="tab-btn active" id="tab-kakao" onclick="switchMap('kakao')">카카오맵</button>
          <button class="tab-btn" id="tab-naver" onclick="switchMap('naver')">네이버 지도</button>
          <button class="tab-btn" id="tab-tmap"  onclick="switchMap('tmap')">T맵</button>
        </div>
        <div class="map-frame">
          <div id="map-render"></div>
          <div class="map-placeholder" id="map-placeholder">
            <div class="map-placeholder-icon">🗺️</div>
            <div class="map-placeholder-text">지도를 불러오는 중...</div>
            <div class="map-placeholder-sub">API 키를 파일 상단에 입력하면<br>여기에 지도가 표시됩니다.</div>
          </div>
        </div>
        <div class="api-banner" id="api-banner">
          ⚠️ API 키 미설정 — 파일 상단 KAKAO_APP_KEY / NAVER_CLIENT_ID / TMAP_APP_KEY 를 입력해 주세요.
        </div>
      </div>

      <div class="sidebar">
        <div class="card fav-section">
          <div class="section-label">즐겨찾기</div>
          <div class="fav-list" id="fav-list"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const FAVORITES = [
  { icon:'🏠', name:'집',        addr:'서울 마포구',  query:'서울 마포구' },
  { icon:'🏢', name:'회사',      addr:'서울 강남구',  query:'서울 강남구' },
  { icon:'☕', name:'단골 카페', addr:'서울 서초구',  query:'서울 서초구 카페' },
  { icon:'💪', name:'헬스장',    addr:'서울 마포구',  query:'서울 마포구 헬스장' },
];
const TRACKS = [
  { title:'Blinding Lights', artist:'The Weeknd' },
  { title:'Dynamite',        artist:'BTS' },
  { title:'Levitating',      artist:'Dua Lipa' },
  { title:'APT.',            artist:'ROSÉ & Bruno Mars' },
];
let trackIdx=0, isPlaying=false, progress=35;
let currentMap='kakao';
let kakaoMap=null, naverMap=null;

/* 시계 */
function updateClock(){
  const n=new Date(), h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=h+':'+m;
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('date-str').textContent=(n.getMonth()+1)+'월 '+n.getDate()+'일 ('+days[n.getDay()]+')';
}
updateClock(); setInterval(updateClock,1000);

/* 날씨 */
async function fetchWeather(){
  try {
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current_weather=true&timezone=Asia%2FSeoul');
    const d=await r.json(); const cw=d.current_weather;
    const descs={0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',51:'이슬비',61:'비',71:'눈',80:'소나기',95:'뇌우'};
    const icons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'🌨️',80:'🌦️',95:'⛈️'};
    document.getElementById('weather-temp').textContent=Math.round(cw.temperature)+'°C';
    document.getElementById('weather-desc').textContent='서울 · '+(descs[cw.weathercode]||'맑음');
    document.getElementById('weather-icon').textContent=icons[cw.weathercode]||'🌤️';
  } catch(e){ document.getElementById('weather-desc').textContent='서울'; }
}
fetchWeather();

/* 음악 */
function renderTrack(){ document.getElementById('music-title').textContent=TRACKS[trackIdx].title; document.getElementById('music-artist').textContent=TRACKS[trackIdx].artist; }
function togglePlay(){ isPlaying=!isPlaying; document.getElementById('playBtn').innerHTML=isPlaying?'&#9646;&#9646;':'&#9654;'; }
function prevTrack(){ trackIdx=(trackIdx-1+TRACKS.length)%TRACKS.length; progress=0; renderTrack(); }
function nextTrack(){ trackIdx=(trackIdx+1)%TRACKS.length; progress=0; renderTrack(); }
setInterval(()=>{ if(isPlaying){ progress=Math.min(100,progress+0.15); document.getElementById('prog').style.width=Math.round(progress)+'%'; if(progress>=100){nextTrack();progress=0;} } },100);
renderTrack();

/* 즐겨찾기 */
function renderFavorites(){
  document.getElementById('fav-list').innerHTML=FAVORITES.map((f,i)=>`
    <div class="fav-item" onclick="goToFav(${i})">
      <div class="fav-icon">${f.icon}</div>
      <div><div class="fav-name">${f.name}</div><div class="fav-addr">${f.addr}</div></div>
      <button class="navi-btn" onclick="event.stopPropagation();goToFav(${i})">길안내</button>
    </div>`).join('');
}
renderFavorites();

/* 지도 초기화 */
function initMaps(){
  const kakaoOK = KAKAO_APP_KEY !== 'YOUR_KAKAO_JAVASCRIPT_KEY';
  const naverOK = NAVER_CLIENT_ID !== 'YOUR_NAVER_CLIENT_ID';
  const tmapOK  = TMAP_APP_KEY  !== 'YOUR_TMAP_APP_KEY';

  if(!kakaoOK && !naverOK && !tmapOK){
    document.getElementById('api-banner').style.display='block';
    document.getElementById('map-placeholder').style.display='flex';
    return;
  }

  /* 카카오맵 */
  if(kakaoOK){
    const s=document.createElement('script');
    s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&libraries=services&autoload=false`;
    s.onload=()=>{ kakao.maps.load(()=>{
      const el=document.createElement('div'); el.id='kakao-map'; el.style.cssText='width:100%;height:100%;';
      document.getElementById('map-render').appendChild(el);
      kakaoMap=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(37.5665,126.9780),level:5});
      document.getElementById('map-placeholder').style.display='none';
    }); };
    document.head.appendChild(s);
  }

  /* 네이버 지도 */
  if(naverOK){
    const s=document.createElement('script');
    s.src=`https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=${NAVER_CLIENT_ID}&submodules=geocoder`;
    s.onload=()=>{
      const el=document.createElement('div'); el.id='naver-map'; el.style.cssText='width:100%;height:100%;display:none;';
      document.getElementById('map-render').appendChild(el);
      naverMap=new naver.maps.Map(el,{center:new naver.maps.LatLng(37.5665,126.9780),zoom:13});
      if(!kakaoOK) document.getElementById('map-placeholder').style.display='none';
    };
    document.head.appendChild(s);
  }

  /* T맵 — iframe 방식 (REST API) */
  if(tmapOK){
    const el=document.createElement('iframe'); el.id='tmap-frame';
    el.style.cssText='width:100%;height:100%;border:none;display:none;';
    el.src=`https://apis.openapi.sk.com/tmap/app/routes?appKey=${TMAP_APP_KEY}`;
    document.getElementById('map-render').appendChild(el);
    if(!kakaoOK && !naverOK) document.getElementById('map-placeholder').style.display='none';
  }
}
window.addEventListener('load',()=>setTimeout(initMaps,300));

/* 탭 전환 */
function switchMap(type){
  currentMap=type;
  ['kakao','naver','tmap'].forEach(t=>{
    document.getElementById('tab-'+t).className='tab-btn'+(t===type?' active':'');
  });
  const kEl=document.getElementById('kakao-map');
  const nEl=document.getElementById('naver-map');
  const tEl=document.getElementById('tmap-frame');
  if(kEl) kEl.style.display=type==='kakao'?'block':'none';
  if(nEl) nEl.style.display=type==='naver'?'block':'none';
  if(tEl) tEl.style.display=type==='tmap' ?'block':'none';
}

/* 장소 검색 */
function searchPlace(){
  const q=document.getElementById('searchInput').value.trim(); if(!q) return;
  if(currentMap==='kakao'&&kakaoMap){
    new kakao.maps.services.Places().keywordSearch(q,(data,status)=>{
      if(status===kakao.maps.services.Status.OK&&data[0]){
        const pos=new kakao.maps.LatLng(data[0].y,data[0].x);
        kakaoMap.setCenter(pos); kakaoMap.setLevel(4);
        new kakao.maps.Marker({map:kakaoMap,position:pos});
      }
    });
  } else if(currentMap==='naver'&&naverMap){
    naver.maps.Service.geocode({query:q},(status,res)=>{
      if(status===naver.maps.Service.Status.OK&&res.v2.addresses[0]){
        const a=res.v2.addresses[0], pos=new naver.maps.LatLng(a.y,a.x);
        naverMap.setCenter(pos); naverMap.setZoom(15);
        new naver.maps.Marker({map:naverMap,position:pos});
      }
    });
  } else if(currentMap==='tmap'){
    const tEl=document.getElementById('tmap-frame');
    if(tEl) tEl.src=`https://apis.openapi.sk.com/tmap/app/routes?appKey=${TMAP_APP_KEY}&name=${encodeURIComponent(q)}`;
  }
}
document.getElementById('searchInput').addEventListener('keydown',e=>{ if(e.key==='Enter') searchPlace(); });

function goToFav(idx){ document.getElementById('searchInput').value=FAVORITES[idx].query; searchPlace(); }
</script>
</body>
</html>
